<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Runs synchronously — before any CSS or JS loads
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body && (document.body.scrollTop = 0);
      if (window.location.hash) history.replaceState(null, '', window.location.pathname);
      // Apply saved theme before paint to prevent flash
      if (localStorage.getItem('agro-theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00ff88" />
    <meta name="description" content="AgroSphere - Smart Farming. Better Future. AI-powered platform for 150 million Indian farmers." />
    <title>AgroSphere — Smart Farming. Better Future.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body style="margin:0; background-color: var(--bg-base, #0a0f0a);">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
